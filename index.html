<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granja Vallejo Villamarín</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container no-print">
    <div class="header-card">
        <img src="logo.png" alt="Logo Granja" class="logo-img">
        <h1>Vallejo Villamarín</h1>
        <p style="margin:0; font-size: 12px; color: #666;">Sistema de Gestión Porcícola</p>
    </div>

    <div class="menu">
        <button onclick="showSection('finanzas')">💰<br>Caja</button>
        <button onclick="showSection('inventario')">🐖<br>Corrales</button>
        <button onclick="showSection('operaciones')">📝<br>Registro</button>
    </div>

    <div id="finanzas" class="box section">
        <div class="balance-box">
            <small>BALANCE TOTAL</small>
            <h3>$ <span id="balance">0.00</span></h3>
        </div>
        <div class="mini-form">
            <input id="fFecha" type="date">
            <input id="fDesc" placeholder="Concepto (Ej: Venta cerdos)">
            <input id="fMonto" type="number" placeholder="Monto $">
            <select id="fTipo">
                <option value="ingreso">🟢 Ingreso</option>
                <option value="gasto">🔴 Gasto</option>
            </select>
            <button class="btn-main" onclick="addFinanzaDirecta()">Guardar en Caja</button>
        </div>
        <ul id="listaFinanzas"></ul>
    </div>

    <div id="inventario" class="box section" style="display:none;">
        <img src="cerditos.png" alt="Cerditos" class="img-cerditos" onerror="this.style.display='none'">
        
        <h2>🐖 Inventario</h2>
        <div class="mini-form">
            <input id="iNombre" placeholder="Nombre del Lote">
            <input id="iCant" type="number" placeholder="Cantidad de animales">
            <button class="btn-main" onclick="addInventarioDirecto()">Agregar al Corral</button>
        </div>
        <ul id="listaInventario"></ul>
    </div>

    <div id="operaciones" class="box section" style="display:none;">
        <h2>🤝 Nueva Operación</h2>
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:15px; font-size: 0.9rem;">
            <label><input type="radio" name="tipoOp" value="venta" checked onclick="toggleOpFields()"> <b>Venta</b></label>
            <label><input type="radio" name="tipoOp" value="compra" onclick="toggleOpFields()"> <b>Compra</b></label>
        </div>
        <div class="mini-form">
            <input id="opEntidad" placeholder="Cliente / Proveedor">
            <div id="fieldsVenta">
                <select id="selectLoteVenta"></select>
                <input id="cantVenta" type="number" placeholder="Cantidad a vender">
            </div>
            <div id="fieldsCompra" style="display:none;">
                <input id="nombreLoteCompra" placeholder="Nombre nuevo lote">
                <input id="cantCompra" type="number" placeholder="Cantidad comprada">
            </div>
            <input id="opMonto" type="number" placeholder="Valor total $">
            <button class="btn-main" style="background:var(--accent);" onclick="procesarOperacion()">✅ Procesar y Recibo</button>
        </div>
    </div>
</div>

<div id="seccionRecibo" style="display:none; padding:10px;">
    <div style="background:white; padding:20px; border-radius:10px; border:2px dashed #999; max-width: 400px; margin: auto;">
        <div style="text-align:center;">
            <img src="logo.png" style="max-width:70px; height:auto;">
            <h3>COMPROBANTE DE PAGO</h3>
            <small>Granja Vallejo Villamarín</small>
        </div>
        <hr>
        <div style="font-size: 0.9rem;">
            <p><b>Fecha:</b> <span id="printFecha"></span></p>
            <p><b>Tipo:</b> <span id="printTipo"></span></p>
            <p><b>Nombre:</b> <span id="printEntidad"></span></p>
            <p><b>Detalle:</b> <span id="printDetalle"></span></p>
        </div>
        <hr>
        <h2 style="text-align:right; margin: 0; color: var(--primary);">TOTAL: $<span id="printTotal"></span></h2>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button class="btn-main" style="width: 120px;" onclick="window.print()">🖨️ Imprimir</button>
        <button class="btn-main" style="background:#666; width: 120px; margin-left:10px;" onclick="cerrarRecibo()">Volver</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
